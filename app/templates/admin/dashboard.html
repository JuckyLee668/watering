<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浇水记录管理后台</title>
  <style>
    body { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; margin: 0; background: #f5f7f6; }
    .wrap { max-width: 1280px; margin: 20px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #dfe5e2; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .row { display: grid; grid-template-columns: repeat(8, minmax(120px, 1fr)); gap: 10px; align-items: end; }
    label { display:block; font-size: 12px; color: #5c6861; margin-bottom: 4px; }
    input, select, button { width: 100%; height: 36px; border: 1px solid #d6ded9; border-radius: 8px; padding: 0 10px; box-sizing: border-box; }
    button { background: #2f7a56; color: #fff; cursor: pointer; }
    .secondary { background: #fff; color: #243129; }
    table { width: 100%; min-width: 1220px; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5ece8; padding: 10px; text-align: left; font-size: 13px; }
    th { background: #f3f8f5; }
    .ok { color: #157347; }
    .pending { color: #bd7a00; }
    .cancel { color: #b3261e; }
    @media (max-width: 900px) { .row { grid-template-columns: repeat(2, minmax(120px, 1fr)); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2 style="margin:0 0 10px;">浇水记录管理后台</h2>
    <div style="margin:0 0 10px;"><a href="/api/v1/admin/log" style="color:#2f7a56;text-decoration:none;">打开微信会话日志独立页面</a></div>
    <div class="row">
      <div><label>开始日期</label><input type="date" id="start_date" /></div>
      <div><label>结束日期</label><input type="date" id="end_date" /></div>
      <div><label>确认状态</label><select id="confirm_status"><option value="">全部</option><option value="1">已确认</option><option value="0">待确认</option><option value="2">已取消</option></select></div>
      <div><label>每页数量</label><select id="limit"><option>50</option><option selected>100</option><option>200</option></select></div>
      <div><label>地块名</label><input type="text" id="plot_name" placeholder="按地块名筛选" /></div>
      <div><label>农户</label><input type="text" id="owner_name" placeholder="按农户筛选" /></div>
      <div><button onclick="loadData()">查询</button></div>
      <div><button class="secondary" onclick="exportCsv()">导出 CSV</button></div>
    </div>
    <div id="meta" style="margin-top:8px;color:#5c6861;font-size:12px;"></div>
  </div>
  <div class="card" style="overflow:auto;">
    <table>
      <thead><tr><th>ID</th><th>组长</th><th>地块</th><th>农户</th><th>水量(方)</th><th>日期</th><th>时间段</th><th>时长</th><th>原始上报</th><th>状态</th><th>创建时间</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function esc(t){return String(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}
function getFilters(){const p=new URLSearchParams();for(const id of ['start_date','end_date','confirm_status','limit','plot_name','owner_name']){const v=document.getElementById(id).value;if(v)p.set(id,v);}p.set('offset','0');return p;}
function statusText(s){if(s===1)return '<span class="ok">已确认</span>';if(s===0)return '<span class="pending">待确认</span>';if(s===2)return '<span class="cancel">已取消</span>';return esc(s);}
function renderRows(rows){const tb=document.getElementById('tbody');tb.innerHTML='';if(!rows.length){tb.innerHTML='<tr><td colspan="11">无记录</td></tr>';return;}rows.forEach(r=>{const tr=document.createElement('tr');const range=r.start_time&&r.end_time?`${r.start_time} - ${r.end_time}`:(r.start_time||'-');tr.innerHTML=`<td>${r.id}</td><td>${esc(r.leader_name||r.user_name||r.user_id)}</td><td>${esc(r.plot_name||'-')}</td><td>${esc(r.plot_owner_name||'-')}</td><td>${Number(r.volume||0).toFixed(1)}</td><td>${esc(r.operation_date||'-')}</td><td>${esc(range)}</td><td>${r.duration_minutes??'-'}</td><td title="${esc(r.raw_input)}">${esc(r.raw_input)||'-'}</td><td>${statusText(r.confirm_status)}</td><td>${esc(r.create_time||'-')}</td>`;tb.appendChild(tr);});}
async function loadData(){const p=getFilters();document.getElementById('meta').innerText='加载中...';const res=await fetch('/api/v1/records?'+p.toString());if(!res.ok){document.getElementById('meta').innerText='加载失败';return;}const rows=await res.json();renderRows(rows);document.getElementById('meta').innerText=`已加载 ${rows.length} 条`;}
function exportCsv(){window.open('/api/v1/records/export?'+getFilters().toString(),'_blank');}
(function(){const t=today();document.getElementById('start_date').value=t;document.getElementById('end_date').value=t;loadData();})();
</script>
</body>
</html>
