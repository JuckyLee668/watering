# WeChat Smart Watering Reporting System Configuration

app:
  name: "${APP_NAME:-微信智能浇水上报系统}"
  version: "${APP_VERSION:-1.0.0}"
  debug: "${APP_DEBUG:-true}"
  host: "${APP_HOST:-0.0.0.0}"
  port: "${APP_PORT:-8000}"

database:
  url: "${DB_URL:-}"
  driver: "${DB_DRIVER:-sqlite}"
  sqlite_path: "${DB_SQLITE_PATH:-data/watering.db}"
  fallback_to_sqlite: "${DB_FALLBACK_TO_SQLITE:-false}"
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-3306}"
  username: "${DB_USERNAME:-}"
  password: "${DB_PASSWORD:-}"
  database: "${DB_NAME:-}"
  charset: "${DB_CHARSET:-utf8mb4}"
  echo: "${DB_ECHO:-false}"
  pool_size: "${DB_POOL_SIZE:-10}"
  max_overflow: "${DB_MAX_OVERFLOW:-20}"
  pool_pre_ping: "${DB_POOL_PRE_PING:-true}"

state:
  pending_timeout: "${STATE_PENDING_TIMEOUT:-300}"
  user_state_ttl: "${STATE_USER_STATE_TTL:-3600}"

wechat:
  app_id: "${WECHAT_APP_ID:-}"
  app_secret: "${WECHAT_APP_SECRET:-}"
  token: "${WECHAT_TOKEN:-}"
  encoding_aes_key: "${WECHAT_ENCODING_AES_KEY:-}"
  callback_url: "${WECHAT_CALLBACK_URL:-/wechat/callback}"
  welcome_message: "${WECHAT_WELCOME_MESSAGE:-您好！欢迎使用智能浇水上报系统。请直接输入浇水信息，例如：今天下午2点到4点给3号地浇了50方水。}"

llm:
  provider: "${LLM_PROVIDER:-deepseek}"

  openai:
    api_key: "${OPENAI_API_KEY:-}"
    base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    model: "${OPENAI_MODEL:-gpt-4o}"
    temperature: "${OPENAI_TEMPERATURE:-0.1}"
    max_tokens: "${OPENAI_MAX_TOKENS:-500}"

  zhipuai:
    api_key: "${ZHIPUAI_API_KEY:-}"

  qwen:
    api_key: "${QWEN_API_KEY:-}"
    model: "${QWEN_MODEL:-qwen-turbo}"

  deepseek:
    api_key: "${DEEPSEEK_API_KEY:-}"
    base_url: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}"
    model: "${DEEPSEEK_MODEL:-deepseek-chat}"

  prompt:
    system_template: |
      你是一个农业数据记录助手，负责从用户输入中提取浇水记录并输出 JSON。
      当前时间：{current_datetime}
      时间解析规则：
      1) “下午/晚上/傍晚/夜里”默认按 24 小时制，9点=21:00。
      2) 若时间段结束时间早于开始时间，表示跨天；end_time 保持次日时刻（如 21:00 到次日12:00 => start_time=21:00,end_time=12:00）。
      3) 出现“次日/翌日/第二天”时，按跨天理解。
      只输出 JSON，不要额外解释。
    examples:
      - input: "今天下午2点到4点给3号地浇了50方水"
        output: '{"plot_name": "3号地", "volume": 50, "date": "{today_date}", "start_time": "14:00", "end_time": "16:00", "confidence": 0.95}'
      - input: "3-1-50号地 21:00 - 次日12:00 打水59方"
        output: '{"plot_name": "3-1-50号地", "volume": 59, "date": "{today_date}", "start_time": "21:00", "end_time": "12:00", "confidence": 0.95}'
      - input: "1号地浇了30方"
        output: '{"plot_name": "1号地", "volume": 30, "date": "{today_date}", "start_time": null, "end_time": null, "confidence": 0.8}'

plots:
  enabled: "${PLOTS_ENABLED:-true}"
  csv_path: "${PLOTS_CSV_PATH:-data/plots_sample.csv}"

logging:
  level: "${LOG_LEVEL:-INFO}"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file: "${LOG_FILE:-logs/app.log}"
  rotation: "${LOG_ROTATION:-100 MB}"
  retention: "${LOG_RETENTION:-30 days}"
  compression: "${LOG_COMPRESSION:-zip}"

cors:
  enabled: "${CORS_ENABLED:-true}"
  allow_origins: ["${CORS_ALLOW_ORIGINS:-*}"]
  allow_credentials: "${CORS_ALLOW_CREDENTIALS:-true}"
  allow_methods: ["${CORS_ALLOW_METHODS:-*}"]
  allow_headers: ["${CORS_ALLOW_HEADERS:-*}"]
