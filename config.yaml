# WeChat Smart Watering Reporting System Configuration

app:
  name: "微信智能浇水上报系统"
  version: "1.0.0"
  debug: true
  host: "0.0.0.0"
  port: 8000

database:
  driver: "sqlite"
  sqlite_path: "data/watering.db"
  fallback_to_sqlite: false
  host: "localhost"
  port: 3306
  username: ""
  password: ""
  database: ""
  charset: "utf8mb4"
  echo: false
  pool_size: 10
  max_overflow: 20
  pool_pre_ping: true

state:
  pending_timeout: 300
  user_state_ttl: 3600

wechat:
  app_id: "wx4989516949bb8835"
  app_secret: "292d62e42f3c55b22b5c78f7e5949c70"
  token: "scglVoORPybqm40Rftvim67C"
  encoding_aes_key: "tTorjAn67oiL5pKbwVZRYfwRs2azEv5jeayyolltxuZ"
  callback_url: "/wechat/callback"
  welcome_message: "您好！欢迎使用智能浇水上报系统。请直接输入浇水信息，例如：今天下午2点到4点给3号地浇了50方水。"

llm:
  # available: openai / zhipuai / qwen / deepseek
  provider: "deepseek"

  openai:
    api_key: "sk-xxxxxxxxxxxxxxxx"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"
    temperature: 0.1
    max_tokens: 500

  zhipuai:
    api_key: "xxxxxxxxxxxxxxxxxxxxxxxx"

  qwen:
    api_key: "sk-xxxxxxxxxxxxxxxx"
    model: "qwen-turbo"

  deepseek:
    api_key: "sk-289d90e0dc744a0ea0636e55b2a9f29f"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"

  prompt:
    system_template: |
      你是一个农业数据记录助手，负责从用户输入中提取浇水记录并输出 JSON。
      当前时间：{current_datetime}
      只输出 JSON，不要额外解释。
    examples:
      - input: "今天下午2点到4点给3号地浇了50方水"
        output: '{"plot_name": "3号地", "volume": 50, "date": "{today_date}", "start_time": "14:00", "end_time": "16:00", "confidence": 0.95}'
      - input: "1号地浇了30方"
        output: '{"plot_name": "1号地", "volume": 30, "date": "{today_date}", "start_time": null, "end_time": null, "confidence": 0.8}'

plots:
  enabled: true
  csv_path: "data/plots_sample.csv"

logging:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file: "logs/app.log"
  rotation: "100 MB"
  retention: "30 days"
  compression: "zip"

cors:
  enabled: true
  allow_origins: ["*"]
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]
